
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quilora</title>
    <style>
      :root {
        --bg: #0a1929;
        --card: #12263a;
        --accent: #3ea0ff;
        --text: #eef6ff;
        --muted: #9fb8cf;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #16324d 0%, var(--bg) 48%);
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .hero {
        width: min(820px, 100%);
        text-align: center;
        padding: 24px 18px;
      }
      .logo {
        width: 86px;
        height: 86px;
        object-fit: contain;
        margin-bottom: 18px;
        filter: drop-shadow(0 8px 24px rgba(62, 160, 255, 0.25));
      }
      h1 {
        margin: 0 0 14px;
        font-size: clamp(2.2rem, 6vw, 4rem);
        letter-spacing: 0.4px;
      }
      p {
        margin: 0;
        font-size: clamp(1.05rem, 2.4vw, 1.35rem);
        color: var(--muted);
        line-height: 1.6;
      }
      .highlight {
        color: var(--text);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero" aria-live="polite">
        <img src="/quilora-logo-icon.png" alt="Quilora logo" class="logo" />
        <h1>Quilora</h1>
        <p><span class="highlight">Prelaunch tomorrow.</span><br />We are preparing everything for launch.</p>
      </section>
    </main>
  </body>
</html>
